<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>SoulMate offline</title>
  <link rel="stylesheet" href="assets/app.css?v=322">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: 22px; }
    .offline-card { width: min(420px, 100%); padding: 24px; border: 1px solid rgba(148,163,184,.28); border-radius: 24px; background: rgba(255,255,255,.86); box-shadow: 0 20px 80px rgba(15,23,42,.12); text-align: center; }
    .offline-mark { width: 58px; height: 58px; margin: 0 auto 14px; border-radius: 20px; display: grid; place-items: center; background: rgba(255,61,127,.1); color: #e11d48; font-weight: 900; }
    .offline-card h1 { margin: 0 0 8px; font-size: 22px; }
    .offline-card p { margin: 0 0 18px; color: #64748b; line-height: 1.9; }
    .offline-card a { display: inline-flex; min-height: 42px; align-items: center; justify-content: center; padding: 0 16px; border-radius: 14px; background: #111827; color: white; text-decoration: none; font-weight: 800; }
  </style>
</head>
<body>
  <main class="offline-card">
    <div class="offline-mark">!</div>
    <h1>ارتباط فعلاً قطع است</h1>
    <p>پیام‌هایی که در صف مانده‌اند بعد از وصل شدن دوباره همگام می‌شوند. صفحه را باز نگه دار یا بعداً دوباره وارد شو.</p>
    <a href="./">بازگشت به SoulMate</a>
  </main>
</body>
</html>
